<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAM RADIO — Lewis Hamilton 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8002d;
    --bg: #050508;
    --panel: #111120;
    --panel2: #181828;
    --border: #1e1e35;
    --border-hi: #2a2a4a;
    --text: #c8cce0;
    --dim: #555570;
    --bright: #eeeeff;
    --cyan: #00d4ff;
    --cyan-dim: #003d4d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(5,5,8,0.97);
    border-bottom: 1px solid var(--border-hi);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; gap: 20px; height: 60px;
  }

  .num {
    font-family: 'Orbitron', monospace;
    font-size: 38px; font-weight: 900;
    color: var(--red); line-height: 1;
    text-shadow: 0 0 20px rgba(232,0,45,0.4);
  }

  .driver-info h1 {
    font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 700;
    color: var(--bright); letter-spacing: 3px; text-transform: uppercase;
  }

  .driver-info p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase;
  }

  .sep { width: 1px; height: 32px; background: var(--border-hi); }

  .status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--dim); letter-spacing: 1px;
    text-transform: uppercase; flex: 1;
  }

  /* MAIN */
  .main {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto; padding: 20px;
    display: grid; grid-template-columns: 280px 1fr;
    gap: 16px; align-items: start;
  }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }

  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.3;
  }

  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }

  .card-title {
    font-family: 'Orbitron', monospace; font-size: 8px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; color: var(--cyan);
  }

  .card-meta {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim);
  }

  .race-list { overflow-y: auto; max-height: calc(100vh - 200px); }
  .race-list::-webkit-scrollbar { width: 3px; }
  .race-list::-webkit-scrollbar-thumb { background: var(--border-hi); }

  .race-item { border-bottom: 1px solid var(--border); }

  .race-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.1s;
  }

  .race-header:hover { background: rgba(255,255,255,0.02); }
  .race-item.open .race-header { background: rgba(0,212,255,0.04); }

  .race-num {
    font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
    color: var(--dim); min-width: 18px; flex-shrink: 0;
  }

  .race-item.open .race-num { color: var(--cyan); }

  .race-info { flex: 1; min-width: 0; }

  .race-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .race-item.open .race-name { color: var(--cyan); }

  .race-circuit {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    color: var(--dim); margin-top: 1px;
  }

  .race-date {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--dim); flex-shrink: 0;
  }

  .chevron {
    font-size: 8px; color: var(--dim);
    transition: transform 0.2s; flex-shrink: 0;
  }

  .race-item.open .chevron { transform: rotate(90deg); color: var(--cyan); }

  .session-btns {
    display: none; flex-wrap: wrap; gap: 5px;
    padding: 8px 14px 10px 42px;
    background: rgba(0,0,0,0.2); border-top: 1px solid var(--border);
  }

  .race-item.open .session-btns { display: flex; }

  .sess-btn {
    padding: 4px 10px;
    background: var(--bg); border: 1px solid var(--border-hi);
    color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 1px; cursor: pointer;
    text-transform: uppercase; transition: all 0.1s;
  }

  .sess-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .sess-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

  .sess-loading {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--dim); display: flex; align-items: center; gap: 6px;
  }

  .spin {
    width: 10px; height: 10px;
    border: 1px solid var(--border-hi); border-top-color: var(--cyan);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CONTENT */
  .content { display: flex; flex-direction: column; gap: 14px; }

  /* STATS */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border); border: 1px solid var(--border);
  }

  .stat { background: var(--panel); padding: 12px 16px; text-align: center; }

  .stat-val {
    font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700;
    color: var(--bright); line-height: 1;
  }

  .stat-lbl {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
  }

  /* PLAYER */
  .player {
    background: var(--panel2); border: 1px solid var(--border);
    padding: 18px; position: relative;
  }

  .player::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }

  .player-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px;
  }

  .player-label {
    font-family: 'Orbitron', monospace; font-size: 8px; font-weight: 700;
    letter-spacing: 3px; color: var(--red); text-transform: uppercase;
  }

  .player-ctx {
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim);
  }

  .player-msg {
    font-size: 15px; font-weight: 500; color: var(--bright); line-height: 1.5;
    min-height: 24px;
  }

  .player-msg.empty { color: var(--dim); font-style: italic; font-size: 13px; }

  .waveform-row { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; }

  .waveform { flex: 1; height: 32px; display: flex; align-items: center; gap: 2px; }

  .bar { flex: 1; background: var(--border-hi); border-radius: 1px; }

  .waveform.playing .bar {
    background: var(--red);
    animation: wave 0.7s ease-in-out infinite;
  }

  .waveform.playing .bar:nth-child(2n) { animation-delay: 0.1s; }
  .waveform.playing .bar:nth-child(3n) { animation-delay: 0.2s; }
  .waveform.playing .bar:nth-child(5n) { animation-delay: 0.35s; }

  @keyframes wave { 0%,100%{height:3px} 50%{height:24px} }

  .time { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--dim); white-space: nowrap; }

  .progress { height: 3px; background: var(--border); cursor: pointer; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: var(--red); width: 0%; transition: width 0.1s linear; }

  .controls { display: flex; align-items: center; gap: 10px; }

  .btn {
    background: var(--bg); border: 1px solid var(--border-hi);
    color: var(--text); width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; transition: all 0.1s;
  }

  .btn:hover { border-color: var(--cyan); color: var(--cyan); }

  .btn.play {
    background: var(--red); border-color: var(--red); color: white;
    width: 42px; height: 42px; font-size: 17px;
  }

  .btn.play:hover { filter: brightness(1.2); }

  .vol { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-left: 8px; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px; background: var(--border-hi); outline: none; cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px;
    background: var(--cyan); cursor: pointer;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  }

  /* LOG */
  .log { display: flex; flex-direction: column; }

  .log-controls {
    display: flex; gap: 8px; padding: 9px 12px;
    border-bottom: 1px solid var(--border); align-items: center;
  }

  .search {
    flex: 1; background: var(--bg); border: 1px solid var(--border-hi);
    color: var(--text); padding: 6px 10px;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    outline: none; transition: border-color 0.1s;
  }

  .search:focus { border-color: var(--cyan); }
  .search::placeholder { color: var(--dim); }

  .filt {
    background: var(--bg); border: 1px solid var(--border-hi);
    color: var(--dim); padding: 6px 12px;
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
    transition: all 0.1s; white-space: nowrap;
  }

  .filt:hover, .filt.on { border-color: var(--cyan); color: var(--cyan); }

  .entries { overflow-y: auto; max-height: 420px; }
  .entries::-webkit-scrollbar { width: 3px; }
  .entries::-webkit-scrollbar-thumb { background: var(--border-hi); }

  .entry {
    display: grid; grid-template-columns: 88px 1fr 30px;
    gap: 10px; align-items: center; padding: 9px 14px;
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.1s; position: relative;
  }

  .entry::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: transparent; transition: background 0.1s;
  }

  .entry:hover { background: rgba(0,212,255,0.03); }
  .entry:hover::before { background: var(--cyan-dim); }
  .entry.active { background: rgba(0,212,255,0.06); }
  .entry.active::before { background: var(--red); }

  .entry-time { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); }
  .entry-label { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text); }
  .entry.active .entry-label { color: var(--bright); }

  .play-icon {
    width: 26px; height: 26px; background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--dim); flex-shrink: 0; transition: all 0.1s;
  }

  .entry:hover .play-icon { border-color: var(--cyan); color: var(--cyan); }
  .entry.active .play-icon { background: var(--red); border-color: var(--red); color: white; }

  /* STATES */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 48px 20px; gap: 12px; color: var(--dim);
  }

  .loader {
    width: 26px; height: 26px;
    border: 2px solid var(--border-hi); border-top-color: var(--cyan);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  .loader-txt {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
  }

  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 48px 20px; gap: 8px; color: var(--dim);
  }

  .empty-icon { font-size: 26px; opacity: 0.3; }
  .empty-txt { font-family: 'Share Tech Mono', monospace; font-size: 11px; text-align: center; line-height: 1.8; }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--panel2); border: 1px solid var(--border-hi);
    border-left: 3px solid var(--cyan);
    padding: 9px 14px; font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text); z-index: 999;
    opacity: 0; transform: translateY(8px); transition: all 0.3s;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  audio { display: none; }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="num">44</div>
    <div class="driver-info">
      <h1>Lewis Hamilton</h1>
      <p>Ferrari · 2026 Season</p>
    </div>
    <div class="sep"></div>
    <div class="status" id="status">Select a race weekend</div>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="card">
      <div class="card-head">
        <div class="card-title">2026 Calendar</div>
        <div class="card-meta" id="gpCount">–</div>
      </div>
      <div class="race-list" id="raceList">
        <div class="loading">
          <div class="loader"></div>
          <div class="loader-txt">Loading calendar...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statMsgs">–</div><div class="stat-lbl">Messages</div></div>
      <div class="stat"><div class="stat-val" id="statAudio">–</div><div class="stat-lbl">With Audio</div></div>
      <div class="stat"><div class="stat-val" id="statSess">–</div><div class="stat-lbl">Session</div></div>
    </div>

    <!-- Player -->
    <div class="player">
      <div class="player-top">
        <div class="player-label">◈ Now Playing</div>
        <div class="player-ctx" id="playerCtx">–</div>
      </div>
      <div class="player-msg empty" id="playerMsg">Select a race weekend then choose a session</div>
      <div class="waveform-row">
        <div class="waveform" id="waveform">
          <div class="bar" style="height:4px"></div>
          <div class="bar" style="height:10px"></div>
          <div class="bar" style="height:4px"></div>
          <div class="bar" style="height:16px"></div>
          <div class="bar" style="height:6px"></div>
          <div class="bar" style="height:20px"></div>
          <div class="bar" style="height:4px"></div>
          <div class="bar" style="height:24px"></div>
          <div class="bar" style="height:10px"></div>
          <div class="bar" style="height:14px"></div>
          <div class="bar" style="height:4px"></div>
          <div class="bar" style="height:18px"></div>
          <div class="bar" style="height:8px"></div>
          <div class="bar" style="height:4px"></div>
          <div class="bar" style="height:12px"></div>
          <div class="bar" style="height:20px"></div>
          <div class="bar" style="height:6px"></div>
          <div class="bar" style="height:4px"></div>
          <div class="bar" style="height:16px"></div>
          <div class="bar" style="height:8px"></div>
        </div>
        <div class="time" id="timeDisp">0:00 / 0:00</div>
      </div>
      <div class="progress" onclick="seek(event)">
        <div class="progress-fill" id="progFill"></div>
      </div>
      <div class="controls">
        <button class="btn" onclick="prevEntry()">⏮</button>
        <button class="btn play" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="btn" onclick="nextEntry()">⏭</button>
        <span class="vol" style="margin-left:8px">VOL</span>
        <input type="range" min="0" max="1" step="0.05" value="0.8" oninput="audio.volume=this.value">
        <button class="btn" onclick="dl()" style="margin-left:auto;font-size:11px" title="Download">⬇</button>
      </div>
    </div>

    <!-- Log -->
    <div class="card log">
      <div class="card-head">
        <div class="card-title">Radio Log</div>
        <div class="card-meta" id="logMeta">No session loaded</div>
      </div>
      <div class="log-controls">
        <input class="search" id="searchBox" placeholder="Search..." oninput="applyFilter()">
        <button class="filt on" id="filtAll" onclick="setFilt('all')">All</button>
        <button class="filt" id="filtAudio" onclick="setFilt('audio')">Audio Only</button>
      </div>
      <div class="entries" id="entries">
        <div class="empty">
          <div class="empty-icon">📡</div>
          <div class="empty-txt">Select a Grand Prix then<br>choose a session</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audioPlayer"></audio>

<script>
const API = 'https://api.openf1.org/v1';
const DRIVER = 44;
const YEAR = 2026;

let meetings = [];
let openKey = null;
let sessionCache = {};
let messages = [];
let filtered = [];
let currentIdx = -1;
let filt = 'all';
let activeMeeting = null;
let activeSession = null;

const audio = document.getElementById('audioPlayer');

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function fmtTime(s) {
  if (!s) return '–';
  return new Date(s).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function fmtAudio(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

function fmtDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

// Load calendar
async function init() {
  try {
    const res = await fetch(`${API}/meetings?year=${YEAR}`);
    if (!res.ok) throw new Error(`Status ${res.status}`);
    const data = await res.json();
    meetings = data.sort((a,b) => new Date(a.date_start) - new Date(b.date_start));
    document.getElementById('gpCount').textContent = `${meetings.length} rounds`;
    renderCalendar();
  } catch(e) {
    document.getElementById('raceList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-txt">Could not load calendar.<br>Error: ${e.message}</div>
      </div>`;
  }
}

function renderCalendar() {
  const el = document.getElementById('raceList');
  if (!meetings.length) {
    el.innerHTML = '<div class="empty"><div class="empty-txt">No rounds found for 2026</div></div>';
    return;
  }

  el.innerHTML = meetings.map((m, i) => `
    <div class="race-item ${openKey === m.meeting_key ? 'open' : ''}" id="ri-${m.meeting_key}">
      <div class="race-header" onclick="toggle(${m.meeting_key}, ${i})">
        <div class="race-num">${i+1}</div>
        <div class="race-info">
          <div class="race-name">${m.meeting_name}</div>
          <div class="race-circuit">${m.circuit_short_name || ''}</div>
        </div>
        <div class="race-date">${fmtDate(m.date_start)}</div>
        <div class="chevron">▶</div>
      </div>
      <div class="session-btns" id="sb-${m.meeting_key}">
        <div class="sess-loading"><div class="spin"></div> Loading...</div>
      </div>
    </div>`).join('');
}

async function toggle(key, idx) {
  const el = document.getElementById(`ri-${key}`);
  const sb = document.getElementById(`sb-${key}`);

  // Close if already open
  if (openKey === key) {
    el.classList.remove('open');
    openKey = null;
    return;
  }

  // Close previous
  if (openKey) {
    const prev = document.getElementById(`ri-${openKey}`);
    if (prev) prev.classList.remove('open');
  }

  openKey = key;
  activeMeeting = meetings[idx];
  el.classList.add('open');

  // Use cache
  if (sessionCache[key]) {
    renderSessions(sb, sessionCache[key]);
    return;
  }

  try {
    const res = await fetch(`${API}/sessions?meeting_key=${key}`);
    if (!res.ok) throw new Error(`Status ${res.status}`);
    const sessions = await res.json();
    sessions.sort((a,b) => new Date(a.date_start) - new Date(b.date_start));
    sessionCache[key] = sessions;
    renderSessions(sb, sessions);
  } catch(e) {
    sb.innerHTML = `<span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)">Error: ${e.message}</span>`;
  }
}

function renderSessions(el, sessions) {
  if (!sessions.length) {
    el.innerHTML = `<span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)">No sessions yet</span>`;
    return;
  }
  el.innerHTML = sessions.map(s => `
    <button class="sess-btn" id="sb-${s.session_key}"
      onclick="loadRadio(${s.session_key},'${s.session_name.replace(/'/g,"\\'")}',this)">
      ${s.session_name}
    </button>`).join('');
}

async function loadRadio(sessionKey, sessionName, btn) {
  // Highlight button
  btn.closest('.session-btns').querySelectorAll('.sess-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  activeSession = sessionName;
  currentIdx = -1;

  document.getElementById('logMeta').textContent = 'Loading...';
  document.getElementById('entries').innerHTML = `
    <div class="loading"><div class="loader"></div><div class="loader-txt">Fetching radio...</div></div>`;

  try {
    const res = await fetch(`${API}/team_radio?session_key=${sessionKey}&driver_number=${DRIVER}`);
    if (!res.ok) throw new Error(`Status ${res.status}`);
    const radio = await res.json();
    radio.sort((a,b) => new Date(a.date) - new Date(b.date));
    messages = radio;

    const withAudio = radio.filter(r => r.recording_url).length;
    document.getElementById('statMsgs').textContent = radio.length;
    document.getElementById('statAudio').textContent = withAudio;
    document.getElementById('statSess').textContent = sessionName
      .replace('Practice 1','FP1').replace('Practice 2','FP2').replace('Practice 3','FP3')
      .replace('Qualifying','QUALI').replace('Race','RACE').replace('Sprint','SPR');
    document.getElementById('status').textContent = `${activeMeeting?.meeting_name} · ${sessionName}`;
    document.getElementById('logMeta').textContent = `${radio.length} messages · ${withAudio} with audio`;

    applyFilter();
    if (!radio.length) toast('No radio messages found for this session');

  } catch(e) {
    document.getElementById('entries').innerHTML = `
      <div class="empty"><div class="empty-txt">Error: ${e.message}</div></div>`;
    document.getElementById('logMeta').textContent = 'Error';
  }
}

function setFilt(f) {
  filt = f;
  document.getElementById('filtAll').classList.toggle('on', f === 'all');
  document.getElementById('filtAudio').classList.toggle('on', f === 'audio');
  applyFilter();
}

function applyFilter() {
  let msgs = messages;
  if (filt === 'audio') msgs = msgs.filter(m => m.recording_url);
  filtered = msgs;
  renderEntries();
}

function renderEntries() {
  const el = document.getElementById('entries');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📻</div><div class="empty-txt">No messages found</div></div>`;
    return;
  }

  el.innerHTML = filtered.map((m, i) => `
    <div class="entry ${i === currentIdx ? 'active' : ''}" onclick="play(${i})" data-i="${i}">
      <div class="entry-time">${fmtTime(m.date)}</div>
      <div class="entry-label">${m.recording_url ? '🎙 Radio clip' : '📄 No audio'}</div>
      <div class="play-icon">${i === currentIdx ? '■' : (m.recording_url ? '▶' : '–')}</div>
    </div>`).join('');
}

function play(idx) {
  const msg = filtered[idx];
  if (!msg) return;

  currentIdx = idx;
  renderEntries();

  document.getElementById('playerCtx').textContent = `${activeMeeting?.meeting_name || ''} · ${activeSession || ''}`;
  document.getElementById('playerMsg').textContent = `📡 Message ${idx+1} of ${filtered.length} · ${fmtTime(msg.date)}`;
  document.getElementById('playerMsg').classList.remove('empty');

  if (msg.recording_url) {
    audio.src = msg.recording_url;
    audio.volume = document.querySelector('input[type=range]').value;
    audio.play().catch(() => toast('Tap Play to start audio'));
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('waveform').classList.add('playing');
  } else {
    audio.src = '';
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('waveform').classList.remove('playing');
    toast('No audio for this message');
  }

  document.querySelector(`[data-i="${idx}"]`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function togglePlay() {
  if (audio.src && !audio.paused) {
    audio.pause();
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('waveform').classList.remove('playing');
  } else if (audio.src) {
    audio.play();
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('waveform').classList.add('playing');
  } else if (filtered.length) {
    play(0);
  }
}

function prevEntry() { if (currentIdx > 0) play(currentIdx - 1); }
function nextEntry() { if (currentIdx < filtered.length - 1) play(currentIdx + 1); }

function seek(e) {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

function dl() {
  const msg = filtered[currentIdx];
  if (msg?.recording_url) {
    const a = document.createElement('a');
    a.href = msg.recording_url;
    a.download = `ham44_${msg.date}.mp3`;
    a.click();
  } else {
    toast('No audio to download');
  }
}

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('timeDisp').textContent =
    `${fmtAudio(audio.currentTime)} / ${fmtAudio(audio.duration)}`;
});

audio.addEventListener('ended', () => {
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('waveform').classList.remove('playing');
  setTimeout(() => nextEntry(), 400);
});

init();
</script>
</body>
</html>
